<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"><title>C-4.2 component packet</title><style>body{margin:0;background:#111;color:#eee;font-family:system-ui;padding:24px}pre{white-space:pre-wrap;direction:ltr;text-align:left;background:#181818;padding:16px;border-radius:8px;overflow:auto}</style></head>
<body><h1>C-4.2 Component Source</h1><pre></pre><script>document.querySelector("pre").textContent = "import React, { useState, useEffect, useRef } from 'react';\n\n/**\n * NowPlaying Component\n * An elegant, dark-luxury now-playing widget designed for a Quran audio app.\n * RTL layout support, custom animated waveform, and interactive states.\n */\nexport default function NowPlaying() {\n  const [isPlaying, setIsPlaying] = useState(false);\n  const [currentTime, setCurrentTime] = useState(42); // start at 42s for preview\n  const duration = 180; // 3 minutes total\n  \n  const canvasRef = useRef(null);\n  const animationRef = useRef(null);\n  const phaseRef = useRef(0);\n\n  // requestAnimationFrame (rAF) strategy:\n  // To achieve jank-free 60fps animation, rendering is decoupled from React's state loop.\n  // We maintain a continuous animation cycle using useRef to store the frame ID, clearing on unmount.\n  // When paused, we decrease phase progression to a micro-drift (0.015) to simulate a \"breathing\" state.\n  // When playing, phase increments faster (0.08) for a dynamic waveform driven by sine waves with edge tapering.\n  useEffect(() => {\n    const canvas = canvasRef.current;\n    if (!canvas) return;\n    const ctx = canvas.getContext('2d');\n    \n    const resize = () => {\n      const dpr = window.devicePixelRatio || 1;\n      canvas.width = canvas.offsetWidth * dpr;\n      canvas.height = canvas.offsetHeight * dpr;\n      ctx.scale(dpr, dpr);\n    };\n    \n    resize();\n    window.addEventListener('resize', resize);\n\n    const render = () => {\n      const w = canvas.offsetWidth;\n      const h = canvas.offsetHeight;\n      if (w === 0 || h === 0) return;\n      \n      ctx.clearRect(0, 0, w, h);\n      \n      const barCount = 38;\n      const barWidth = 3;\n      const gap = 5;\n      const totalWidth = barCount * (barWidth + gap) - gap;\n      const startX = (w - totalWidth) / 2;\n      \n      phaseRef.current += isPlaying ? 0.08 : 0.015;\n      ctx.fillStyle = '#C5A880'; // Low-saturation warm gold\n      \n      for (let i = 0; i < barCount; i++) {\n        const x = startX + i * (barWidth + gap);\n        const centerOffset = Math.abs(i - barCount / 2) / (barCount / 2);\n        const envelope = Math.cos(centerOffset * Math.PI / 2); // Elegant dome taper\n        \n        let targetHeight = 0;\n        if (isPlaying) {\n          targetHeight = (Math.sin(i * 0.25 + phaseRef.current) * 12 + \n                         Math.cos(i * 0.12 - phaseRef.current * 1.3) * 6 + 18) * envelope;\n        } else {\n          targetHeight = (Math.sin(i * 0.15 + phaseRef.current) * 3 + 6) * envelope;\n        }\n        \n        const finalHeight = Math.max(3, targetHeight);\n        const y = (h - finalHeight) / 2;\n        \n        ctx.beginPath();\n        ctx.roundRect(x, y, barWidth, finalHeight, 1.5);\n        ctx.fill();\n      }\n      \n      animationRef.current = requestAnimationFrame(render);\n    };\n\n    render();\n\n    return () => {\n      cancelAnimationFrame(animationRef.current);\n      window.removeEventListener('resize', resize);\n    };\n  }, [isPlaying]);\n\n  // Handle active progress timer ticking\n  useEffect(() => {\n    let interval = null;\n    if (isPlaying) {\n      interval = setInterval(() => {\n        setCurrentTime((prev) => {\n          if (prev >= duration) {\n            setIsPlaying(false);\n            return 0;\n          }\n          return prev + 1;\n        });\n      }, 1000);\n    }\n    return () => clearInterval(interval);\n  }, [isPlaying]);\n\n  const handleProgressClick = (e) => {\n    const rect = e.currentTarget.getBoundingClientRect();\n    const clickXFromRight = rect.right - e.clientX; // RTL progress calculation\n    const ratio = Math.max(0, Math.min(1, clickXFromRight / rect.width));\n    setCurrentTime(Math.floor(ratio * duration));\n  };\n\n  const handleSkipBack = () => {\n    setCurrentTime((prev) => Math.max(0, prev - 10));\n  };\n\n  const formatTime = (secs) => {\n    const m = Math.floor(secs / 60);\n    const s = secs % 60;\n    return `${m}:${s < 10 ? '0' : ''}${s}`;\n  };\n\n  const percentage = (currentTime / duration) * 100;\n\n  return (\n    <div style={styles.card}>\n      <style dangerouslySetInnerHTML={{ __html: hoverCSS }} />\n      \n      {/* Surah & Reciter Header */}\n      <div style={styles.header}>\n        <h1 style={styles.surahTitle} lang=\"ar\">سُورَةُ الرَّحْمَٰنِ</h1>\n        <p style={styles.reciter} lang=\"ar\">الشيخ عبد الباسط عبد الصمد</p>\n      </div>\n\n      {/* Waveform Area */}\n      <div style={styles.waveContainer}>\n        <canvas ref={canvasRef} style={styles.canvas} />\n      </div>\n\n      {/* Progress Slider (RTL) */}\n      <div style={styles.progressContainer}>\n        <div \n          style={styles.progressBarTrack} \n          onClick={handleProgressClick}\n          className=\"progress-track\"\n        >\n          <div style={styles.progressBg}>\n            <div style={{ ...styles.progressFill, width: `${percentage}%` }} />\n            <div \n              style={{ ...styles.progressKnob, right: `calc(${percentage}% - 5px)` }} \n              className=\"progress-knob\" \n            />\n          </div>\n        </div>\n        <div style={styles.timeLabel}>\n          <span>{formatTime(currentTime)}</span>\n          <span>{formatTime(duration)}</span>\n        </div>\n      </div>\n\n      {/* Navigation Controls */}\n      <div style={styles.controls}>\n        {/* Back 10 Seconds */}\n        <button \n          onClick={handleSkipBack} \n          style={styles.btnSecondary} \n          className=\"btn-sec\"\n          aria-label=\"رجوع ١٠ ثوانٍ\"\n        >\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokeWidth=\"2\" strokeLinecap=\"round\" strokeLinejoin=\"round\">\n            <path d=\"M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8\" />\n            <path d=\"M3 3v5h5\" />\n            <text x=\"12\" y=\"15.5\" fontSize=\"7.5\" fontWeight=\"bold\" fill=\"currentColor\" textAnchor=\"middle\" stroke=\"none\">10</text>\n          </svg>\n        </button>\n\n        {/* Play/Pause */}\n        <button \n          onClick={() => setIsPlaying(!isPlaying)} \n          style={isPlaying ? styles.btnPlayActive : styles.btnPlay} \n          className=\"btn-main\"\n          aria-label={isPlaying ? \"إيقاف مؤقت\" : \"تشغيل\"}\n        >\n          {isPlaying ? (\n            <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"currentColor\">\n              <rect x=\"6\" y=\"4\" width=\"4\" height=\"16\" rx=\"1\" />\n              <rect x=\"14\" y=\"4\" width=\"4\" height=\"16\" rx=\"1\" />\n            </svg>\n          ) : (\n            <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"currentColor\" style={{ transform: 'scaleX(-1)' }}>\n              <polygon points=\"6,4 20,12 6,20\" />\n            </svg>\n          )}\n        </button>\n      </div>\n    </div>\n  );\n}\n\nconst styles = {\n  card: {\n    direction: 'rtl',\n    width: '360px',\n    backgroundColor: '#0F0F0F', // Ultra-matte obsidian base\n    border: '1px solid #1E1E1E', // Quiet dark dividing line\n    borderRadius: '16px',\n    padding: '28px 24px',\n    boxShadow: '0 25px 50px -12px rgba(0, 0, 0, 0.8)', // Deep shadow hierarchy\n    fontFamily: '\"Amiri\", \"Scheherazade New\", Georgia, serif',\n    color: '#D1D1D1',\n    display: 'flex',\n    flexDirection: 'column',\n    gap: '24px',\n    margin: '30px auto',\n    boxSizing: 'border-box',\n  },\n  header: {\n    display: 'flex',\n    flexDirection: 'column',\n    alignItems: 'center',\n    gap: '6px',\n    textAlign: 'center',\n  },\n  surahTitle: {\n    fontSize: '26px',\n    fontWeight: 'bold',\n    color: '#C5A880', // Matte metallic gold\n    margin: 0,\n    textShadow: '0 2px 8px rgba(0, 0, 0, 0.5)',\n  },\n  reciter: {\n    fontSize: '13px',\n    color: '#707070',\n    margin: 0,\n    fontFamily: '\"Segoe UI\", Roboto, sans-serif',\n    letterSpacing: '0.3px',\n  },\n  waveContainer: {\n    height: '64px',\n    width: '100%',\n  },\n  canvas: {\n    width: '100%',\n    height: '100%',\n    display: 'block',\n  },\n  progressContainer: {\n    display: 'flex',\n    flexDirection: 'column',\n    gap: '6px',\n  },\n  progressBarTrack: {\n    width: '100%',\n    height: '16px',\n    display: 'flex',\n    alignItems: 'center',\n    cursor: 'pointer',\n  },\n  progressBg: {\n    width: '100%',\n    height: '3px',\n    backgroundColor: '#1C1C1C',\n    position: 'relative',\n    borderRadius: '2px',\n  },\n  progressFill: {\n    height: '100%',\n    backgroundColor: '#C5A880',\n    position: 'absolute',\n    right: 0,\n    top: 0,\n    borderRadius: '2px',\n  },\n  progressKnob: {\n    position: 'absolute',\n    top: '-3.5px',\n    width: '10px',\n    height: '10px',\n    borderRadius: '50%',\n    backgroundColor: '#C5A880',\n    boxShadow: '0 2px 4px rgba(0,0,0,0.6)',\n    transition: 'transform 0.15s ease, background-color 0.15s ease',\n  },\n  timeLabel: {\n    display: 'flex',\n    justifyContent: 'space-between',\n    fontSize: '11px',\n    color: '#555',\n    fontFamily: 'monospace, sans-serif',\n  },\n  controls: {\n    display: 'flex',\n    justifyContent: 'center',\n    alignItems: 'center',\n    gap: '24px',\n  },\n  btnSecondary: {\n    background: '#141414',\n    border: '1px solid #222',\n    color: '#888',\n    borderRadius: '50%',\n    width: '40px',\n    height: '40px',\n    display: 'flex',\n    alignItems: 'center',\n    justifyContent: 'center',\n    cursor: 'pointer',\n    transition: 'all 0.2s ease',\n    padding: 0,\n  },\n  btnPlay: {\n    backgroundColor: '#C5A880',\n    color: '#0A0A0A',\n    border: 'none',\n    borderRadius: '50%',\n    width: '52px',\n    height: '52px',\n    display: 'flex',\n    alignItems: 'center',\n    justifyContent: 'center',\n    cursor: 'pointer',\n    transition: 'all 0.2s ease',\n    padding: 0,\n    boxShadow: '0 4px 12px rgba(197, 168, 128, 0.2)',\n  },\n  btnPlayActive: {\n    backgroundColor: '#0F0F0F',\n    color: '#C5A880',\n    border: '1px solid #C5A880',\n    borderRadius: '50%',\n    width: '52px',\n    height: '52px',\n    display: 'flex',\n    alignItems: 'center',\n    justifyContent: 'center',\n    cursor: 'pointer',\n    transition: 'all 0.2s ease',\n    padding: 0,\n  },\n};\n\nconst hoverCSS = `\n  .btn-sec:hover {\n    color: #C5A880 !important;\n    border-color: #333 !important;\n    background: #1A1A1A !important;\n  }\n  .btn-sec:active {\n    transform: scale(0.95);\n  }\n  .btn-main:hover {\n    transform: scale(1.06);\n  }\n  .btn-main:active {\n    transform: scale(0.94);\n  }\n  .progress-track:hover .progress-knob {\n    transform: scale(1.4);\n    background-color: #E5C8A0 !important;\n  }\n`;\n";</script></body></html>
